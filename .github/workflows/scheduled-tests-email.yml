name: Scheduled Cucumber Tests + Email Report

on:
  # Best-effort every 10 minutes. NOTE: GitHub's scheduled cron is not exact —
  # runs can be delayed or skipped under load, and the schedule auto-disables
  # after 60 days with no repo commits.
  schedule:
    - cron: "*/10 * * * *"
  # Lets you trigger a run manually from the Actions tab to test immediately.
  workflow_dispatch:

# If a run is still going when the next one fires, skip the new one rather than
# stacking up.
concurrency:
  group: scheduled-tests
  cancel-in-progress: false

jobs:
  test-and-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install Playwright browsers (+ OS deps)
        run: |
          mvn -B -q dependency:build-classpath \
            -Dmdep.includeScope=test -Dmdep.outputFile=pw-cp.txt
          java -cp "$(cat pw-cp.txt)" com.microsoft.playwright.CLI install --with-deps chromium

      - name: Run Cucumber tests
        # testFailureIgnore=true in pom.xml keeps this green even when scenarios
        # fail, so target/test-summary.html is always generated for the email.
        run: mvn -B test

      - name: Prepare email body from test-summary.html
        if: always()
        id: body
        run: |
          REPORT=target/test-summary.html
          DELIM="REPORT_BODY_$(date +%s%N)"
          {
            echo "html<<$DELIM"
            if [ -f "$REPORT" ]; then
              cat "$REPORT"
            else
              echo "<h2>No test report was produced</h2>"
              echo "<p>The build likely failed before tests ran (e.g. a compilation error)."
              echo "Check the workflow logs in the Actions tab.</p>"
            fi
            # test-summary.html has no trailing newline; this guarantees the
            # closing delimiter lands on its own line.
            echo ""
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Send report email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Cucumber CI <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: "Cucumber Test Report — ${{ github.repository }} run #${{ github.run_number }}"
          html_body: ${{ steps.body.outputs.html }}
